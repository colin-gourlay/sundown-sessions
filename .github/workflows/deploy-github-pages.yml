name: Deploy to GitHub pages

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/deploy-github-pages.yml
  pull_request:
    paths:
      - src/**
      - .github/workflows/deploy-github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.146.5
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass (no snap)
        env:
          SASS_VERSION: 1.77.8
        run: |
          set -euo pipefail
          curl -fsSL -o "${{ runner.temp }}/dart-sass.tar.gz" \
            "https://github.com/sass/dart-sass/releases/download/${SASS_VERSION}/dart-sass-${SASS_VERSION}-linux-x64.tar.gz"
          tar -xzf "${{ runner.temp }}/dart-sass.tar.gz" -C "${{ runner.temp }}"
          sudo mv "${{ runner.temp }}/dart-sass" /opt/dart-sass
          sudo ln -sf /opt/dart-sass/sass /usr/local/bin/sass
          sass --version
      - name: Checkout source using v4.1.1
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Cache Hugo build artefacts
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            src/resources/_gen
            /tmp/hugo_cache
          key: hugo-${{ runner.os }}-${{ hashFiles('src/config/**', 'src/layouts/**', 'src/content/**', 'src/themes/**', 'src/assets/**') }}
          restore-keys: |
            hugo-${{ runner.os }}-
      - name: Setup pages using v4.0.0
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: githubPages
          HUGO_ENV: githubPages
        run: |
          hugo \
            --source src \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact using v3.0.1
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./src/public

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages using v4.0.4
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
