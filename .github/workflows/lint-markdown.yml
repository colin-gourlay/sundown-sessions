name: Lint Markdown

on:
  push:
  pull_request:

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source using v4.1.1
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Lint Markdown using v22.0.0
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd
        with:
          globs: |
            **/*.md
            !src/themes/**
