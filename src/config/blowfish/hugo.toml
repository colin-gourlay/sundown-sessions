# Parallel Blowfish configuration — NOT loaded by default.
#
# This config exists so reviewers can preview the site under the Blowfish theme
# during the staged migration without disturbing the live `sundown-sessions`
# theme served from src/config/_default/.
#
# Preview locally with:
#
#   hugo server --source src --config config/_default/hugo.toml,config/blowfish/hugo.toml
#
# When Blowfish reaches parity, the contents of this directory will be folded
# into src/config/_default/ as part of the cutover PR.

theme = 'blowfish'

# Blowfish ships its own defaults for these. We override the few that conflict
# with how the site currently builds.
buildFuture = true
enableRobotsTXT = true
summaryLength = 0
enableEmoji = true

[pagination]
  pagerSize = 100

[outputs]
  home = ["HTML", "RSS", "JSON"]
