# Parallel Blowfish params — NOT loaded by default.
#
# Held-back stub to be expanded in PR 2 (parity scaffolding). Subsequent PRs
# will populate colourScheme, defaultAppearance, mainSections, and a
# `socialIcons` mapping derived from the existing `[[socials]]` entries in
# src/config/_default/params.toml.

# Theme colour scheme — Blowfish ships several presets. Leaving the default
# in place until the homepage slice (PR 5) chooses a final palette.
# colorScheme = "blowfish"

# Appearance toggle — "auto" follows the visitor's system setting; switch to
# "dark" or "light" in PR 5/6 if a forced appearance is preferred.
defaultAppearance = "auto"
autoSwitchAppearance = true

# Sections that contribute to listings such as the homepage recent list.
# The site's primary content lives under content/shows, content/releases, and
# content/artists; this will be revisited during the content-template port (PR 4).
mainSections = ["shows", "releases", "artists"]
