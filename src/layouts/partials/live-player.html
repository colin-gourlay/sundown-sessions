{{ with .Site.Params.listen_live_stream_url }}
<div id="live-player" class="live-player bg-black white" role="region" aria-label="Live Radio Player">
  <div class="flex items-center justify-between ph3 ph4-ns pv2">
    <div class="flex items-center">
      <span class="live-badge f6 fw7 ph2 pv1 br2 mr3" aria-hidden="true">&#9679; LIVE</span>
      <span class="f5 fw4 white-90">Listen Live</span>
    </div>
    <audio id="live-audio" controls preload="none" class="live-audio">
      <source src="{{ . }}" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>
</div>
{{ end }}
