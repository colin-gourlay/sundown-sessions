{{ $link := .Get 0 }}
{{ $firstChar := index $link 0 | printf "%c" | lower }}
{{ $slug := $link | urlize }}
{{ $page := site.GetPage (printf "artists/%s/%s" $firstChar $slug) }}
{{ if $page -}}
<a href="{{ $page.RelPermalink }}">{{ $link }}</a>
{{- else -}}
<a href="{{ printf "artists/%s/%s/" $firstChar $slug | absURL }}">{{ $link }}</a>
{{- end }}
