<footer class="site-footer" role="contentinfo">
  <div class="site-footer__inner">
    <a class="site-footer__copyright" href="{{ .Site.Home.Permalink }}">
      {{ $start := 2024 }}
      {{ $current := now.Year }}
      &copy; {{ $start }}{{ if gt $current $start }}&ndash;{{ $current }}{{ end }}
      {{ with .Site.Copyright | default .Site.Title }} {{ . | safeHTML }}{{ end }}
    </a>
    <div>{{ partial "social-follow.html" . }}</div>
  </div>
</footer>
